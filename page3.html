<!DOCTYPE html>
<html>
<head>
  <title>Love You 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body { 
      text-align:center; 
      background: linear-gradient(to right, #ffd1ff, #ff9a9e); 
      font-family:'Roboto', sans-serif; 
      overflow-x:hidden; 
      color:white; 
    }

    /* main love messages font */
    .loveText {
      font-family:'Pacifico', cursive;
      font-size:32px;  /* decreased font size */
      margin-top:20px;
      color:#ff2e63;
      animation: fadeIn 2s;
    }

    button { 
      padding:12px 20px; 
      font-size:18px; 
      margin:20px; 
      border-radius:10px; 
      border:none; 
      cursor:pointer; 
      background:white; 
      color:#ff2e63; 
      transition:0.3s;
    }

    button:hover { transform: scale(1.1); }

    .heart { 
      position:absolute; 
      font-size:24px; 
      animation: float 5s infinite; 
    }

    @keyframes float { 
      0% {transform: translateY(0) scale(1); opacity:1;} 
      50% {transform: translateY(-200px) scale(1.3); opacity:0.7;} 
      100% {transform: translateY(-400px) scale(0.8); opacity:0;} 
    }

    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
  </style>
</head>
<body>

<!-- All love messages -->
<h1 class="loveText">💖 Love you cutiiee 💖</h1>
<h1 class="loveText">💘 Love you darling 💘</h1>
<h1 class="loveText">💞 Love you laila 💞</h1>
<h1 class="loveText">🍾 Love you nasha ka bottle 🍾</h1>
<h1 class="loveText">🐦 Love you chidya 🐦</h1>
<h1 class="loveText">😍 Love you babe 😍</h1>
<h1 class="loveText">💝 Love you sweetheart 💝</h1>
<h1 class="loveText">💌 Love you pglu 💌</h1>
<h1 class="loveText">💖 Love you with my whole hearttttttttttt 💖</h1>
<h1 class="loveText">🥰 Cutieeeeeeeeeeeeeeeeeeeee 🥰</h1>

<!-- Go back button -->
<button onclick="window.location.href='page2.html'">Go Back ⬅️</button>

<!-- Floating hearts -->
<script>
function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * window.innerWidth + 'px';
  heart.innerText = '💗';
  document.body.appendChild(heart);
  setTimeout(() => { heart.remove(); }, 5000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>

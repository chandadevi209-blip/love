<!DOCTYPE html>
<html>
<head>
  <title>Love Page 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body { text-align:center; background: linear-gradient(to right, #fad0c4, #ffd1ff); font-family:'Roboto', sans-serif; overflow-x:hidden; }
    h1 { font-family:'Pacifico', cursive; font-size:50px; color:#ff2e63; animation: fadeIn 2s; }
    img { width:200px; border-radius:12px; margin:10px; transition:0.5s; }
    img:hover { transform: scale(1.2); }
    button { padding:12px 20px; font-size:18px; margin:8px; border-radius:10px; border:none; cursor:pointer; transition:0.3s;}
    button:hover { transform: scale(1.1); }
    .nickname { background:#f8b500; color:white; }
    .back { background:#ffffff; color:#ff2e63; }

    .heart { position:absolute; font-size:24px; animation: float 5s infinite; }
    @keyframes float { 0% {transform: translateY(0) scale(1); opacity:1;} 50% {transform: translateY(-200px) scale(1.3); opacity:0.7;} 100% {transform: translateY(-400px) scale(0.8); opacity:0;} }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
  </style>
</head>
<body>

<h1>I Love You babyyyyyyyyyyyyyyyyyyy💗</h1>
<p>Happy 1 Month 💗</p>

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

<!-- Music -->
<audio autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- Buttons -->
<button class="nickname" onclick="window.location.href='page3.html'">Nickname 💗</button>
<button class="back" onclick="window.location.href='index.html'">Go Back ⬅️</button>

<script>
function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * window.innerWidth + 'px';
  heart.innerText = '💗';
  document.body.appendChild(heart);
  setTimeout(() => { heart.remove(); }, 5000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>

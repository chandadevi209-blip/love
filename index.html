<!DOCTYPE html>
<html>
<head>
  <title>Happy 1 Month 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      text-align:center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: 'Roboto', sans-serif;
      color:white;
      margin-top:80px;
      overflow-x:hidden;
    }
    h1 { font-family: 'Pacifico', cursive; font-size:50px; animation: fadeIn 2s; }
    button {
      padding:15px 25px;
      font-size:18px;
      margin:10px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      transition: 0.3s;
    }
    button:hover { transform: scale(1.1); }
    .yes { background:#ff2e63; color:white; }
    .no { background:white; color:#ff2e63; }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: float 5s infinite;
    }

    @keyframes float { 0% {transform: translateY(0) scale(1); opacity:1;} 50% {transform: translateY(-200px) scale(1.3); opacity:0.7;} 100% {transform: translateY(-400px) scale(0.8); opacity:0;} }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
  </style>
</head>
<body>

<h1>Happy 1 Month 💗 </h1>
<p>Do you love me? 💗</p>

<button class="yes" onclick="window.location.href='page2.html'">Yes 💗</button>
<button class="no" onclick="alert('You cannot say no 😄💗')">No 😜</button>

<script>
function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * window.innerWidth + 'px';
  heart.innerText = '💗';
  document.body.appendChild(heart);
  setTimeout(() => { heart.remove(); }, 5000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>

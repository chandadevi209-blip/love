<!DOCTYPE html>
<html>
<head>
  <title>Happy 1 Month 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      text-align:center;
      background: linear-gradient(to right,#ffd1ff,#ff9a9e);
      font-family:'Roboto', sans-serif;
      overflow-x:hidden;
      color:white;
      height:100vh;
      margin:0;
      position:relative;
    }

    h1 {
      font-family:'Pacifico', cursive;
      font-size:50px;
      margin-top:100px;
      color:#ff2e63;
      animation: fadeIn 2s;
    }

    button {
      padding:12px 20px;
      font-size:18px;
      margin:20px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      background:white;
      color:#ff2e63;
      transition:0.3s;
      position:relative;
    }

    button:hover { transform: scale(1.1); }

    .heart {
      position:absolute;
      font-size:24px;
      animation: float 5s infinite;
    }

    @keyframes float {
      0%{transform:translateY(0) scale(1);opacity:1;}
      50%{transform:translateY(-200px) scale(1.3);opacity:0.7;}
      100%{transform:translateY(-400px) scale(0.8);opacity:0;}
    }

    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  </style>
</head>
<body>

<h1>Do you love me? 💗</h1>

<button id="yesBtn">Yes 💗</button>
<button id="noBtn">No 💔</button>

<!-- Music -->
<audio id="loveSong" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  // Play music when first button clicked
  let musicStarted = false;
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const audio = document.getElementById('loveSong');

  yesBtn.addEventListener('click', () => {
    if(!musicStarted){
      audio.play(); // start music on mobile
      musicStarted = true;
    }
    // go to Love page (page2.html)
    window.location.href = 'page2.html';
  });

  // Move No button randomly
  noBtn.addEventListener('mouseenter', () => {
    const x = Math.floor(Math.random() * (window.innerWidth - noBtn.offsetWidth));
    const y = Math.floor(Math.random() * (window.innerHeight - noBtn.offsetHeight));
    noBtn.style.position = 'absolute';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
  });

  // Floating hearts
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.innerText = '💗';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }
  setInterval(createHeart, 500);
</script>

</body>
</html>
